# Render Blueprint — single service serving BOTH the React frontend and the API.
# Create from this: Render Dashboard → New → Blueprint → pick this repo.
services:
  - type: web
    name: edii-tn-lms
    runtime: node
    plan: free
    # Build the frontend, then install the server deps.
    # --include=dev ensures Vite (a devDependency) is available for the build,
    # even if Render sets NODE_ENV=production.
    buildCommand: cd client && npm install --include=dev && npm run build && cd ../server && npm install
    startCommand: cd server && npm start
    healthCheckPath: /api/health
    envVars:
      - key: MONGO_URI
        sync: false # set to your Atlas connection string (with /edii-lms db name)
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES
        value: 15m
      - key: JWT_REFRESH_EXPIRES
        value: 7d
